[build]
  command = "npm run build --prefix frontend"
  publish = "frontend/dist"
  functions = "backend/src"

[build.environment]
  NODE_VERSION = "20"
  YARN_VERSION = "1.22.19"
  NETLIFY = "true"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/index/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
